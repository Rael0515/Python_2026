name: Build Mac Game

on:
  push:
    branches: ["main"] # 코드를 올릴 때마다 자동 실행

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 저장소의 코드를 가져옵니다
        uses: actions/checkout@v4

      - name: 파이썬 세팅 (3.11 버전)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 빌드 도구 설치
        run: |
          pip install pyinstaller

      - name: 맥용 실행 파일 생성
        run: |
          # --name 뒤의 "RedTextGame"은 친구가 보게 될 파일 이름입니다. 원하는 대로 바꾸세요!
          pyinstaller --onefile --name "RedTextGame" main.py

      - name: 완성된 파일을 결과물로 저장
        uses: actions/upload-artifact@v4
        with:
          name: Mac-Executable
          path: dist/RedTextGame
